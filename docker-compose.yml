services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: pgtrust
      POSTGRES_PASSWORD: pgtrust
      POSTGRES_DB: pgtrust
    ports:
      - "5432:5432"
    volumes:
      - pgtrust_db:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://pgtrust:pgtrust@db:5432/pgtrust
      SECRET_KEY: dev_secret_change_me
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    command: sh -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgtrust_db:

